# Supabase CLI — https://supabase.com/docs/guides/cli/config
# Cron calls these with x-cron-secret only (no JWT). Deploy with --no-verify-jwt, or Dashboard →
# Edge Functions → [name] → disable "Enforce JWT verification".
# Deploy examples:
#   npx supabase functions deploy enqueue_release_sync_candidates --no-verify-jwt
#   npx supabase functions deploy daily_push_dispatcher --no-verify-jwt
# Also: refresh_series_progress_catalog (series TMDB totals + new_episodes notifications)

[api]
enabled = true

[functions.enqueue_release_sync_candidates]
verify_jwt = false

[functions.process_series_sync_queue]
verify_jwt = false

[functions.send_due_notifications]
verify_jwt = false

[functions.refresh_series_progress_catalog]
verify_jwt = false

[functions.daily_push_dispatcher]
verify_jwt = false

[functions.weekly_series_catchup_notifications]
verify_jwt = false
